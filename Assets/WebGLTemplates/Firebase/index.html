<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>%PRODUCT_NAME%</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <!-- ══════════════════════════════════════════════════════════ -->
  <!--  Firebase Compat SDK — load đồng bộ, không dùng module   -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    // ── Firebase Config (vibecode-drawline) ──
    var firebaseConfig = {
      apiKey:            "AIzaSyDbRIKWL6QcJi_H8CjNSEb4tswAC8WA1Os",
      authDomain:        "vibecode-drawline.firebaseapp.com",
      databaseURL:       "https://vibecode-drawline-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId:         "vibecode-drawline",
      storageBucket:     "vibecode-drawline.firebasestorage.app",
      messagingSenderId: "996110386832",
      appId:             "1:996110386832:web:be45d6c02cabfd5aacba15"
    };

    // ── Init app ──
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    // ── Expose Auth & DB to window (cho jslib truy cập) ──
    window.firebaseAuth = firebase.auth();
    window.firebaseDB   = firebase.database();

    // ── Auth helpers ──
    window.firebaseSignIn = function(email, password) {
      return window.firebaseAuth.signInWithEmailAndPassword(email, password);
    };
    window.firebaseSignUp = function(email, password) {
      return window.firebaseAuth.createUserWithEmailAndPassword(email, password);
    };
    window.firebaseSignOut = function() {
      return window.firebaseAuth.signOut();
    };
    window.firebaseSendPasswordReset = function(email) {
      return window.firebaseAuth.sendPasswordResetEmail(email);
    };

    // ── Database helpers ──
    window.firebaseDBSet = function(path, value) {
      return window.firebaseDB.ref(path).set(value);
    };
    window.firebaseDBGet = function(path) {
      return window.firebaseDB.ref(path).get();
    };

    // ── Auth state listener ──
    window.firebaseAuth.onAuthStateChanged(function(user) {
      window._firebaseCurrentUser = user || null;
      console.log('[Firebase] Auth state:', user ? ('UID=' + user.uid) : 'signed out');
    });

    console.log('[Firebase] Compat SDK initialized — vibecode-drawline');
  </script>
  <!-- ══════════════════════════════════════════════════════════ -->
</head>
<body>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">%PRODUCT_NAME%</div>
    </div>
  </div>

  <script>
    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function() {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/%LOADER_FILENAME%";
    var config = {
      dataUrl:            buildUrl + "/%DATA_FILENAME%",
      frameworkUrl:       buildUrl + "/%FRAMEWORK_FILENAME%",
#if USE_THREADS
      workerUrl:          buildUrl + "/%WORKER_FILENAME%",
#endif
#if USE_WASM
      codeUrl:            buildUrl + "/%CODE_FILENAME%",
#endif
#if MEMORY_FILENAME
      memoryUrl:          buildUrl + "/%MEMORY_FILENAME%",
#endif
#if SYMBOLS_FILENAME
      symbolsUrl:         buildUrl + "/%SYMBOLS_FILENAME%",
#endif
      streamingAssetsUrl: "StreamingAssets",
      companyName:        "%COMPANY_NAME%",
      productName:        "%PRODUCT_NAME%",
      productVersion:     "%PRODUCT_VERSION%",
      showBanner:         unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }
    canvas.style.touchAction = "none";

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        loadingBar.style.display = "none";
        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
        };
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);

    // ── Gửi sự kiện Pinch-to-Zoom từ Mobile Browser vào Unity ──
    var initialPinchDistance = null;
    window.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        initialPinchDistance = Math.sqrt(dx*dx + dy*dy);
      }
    }, { capture: true, passive: false });

    window.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2 && initialPinchDistance !== null && window.unityInstance) {
        // Có thể gọi preventDefault nếu e.cancelable
        if (e.cancelable) e.preventDefault(); 
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        var currentDistance = Math.sqrt(dx*dx + dy*dy);
        var difference = currentDistance - initialPinchDistance;
        
        window.unityInstance.SendMessage('WebGLZoomBridge', 'OnPinchZoom', difference.toString());
        initialPinchDistance = currentDistance;
      }
    }, { capture: true, passive: false });

    window.addEventListener('touchend', function(e) {
      if (e.touches.length < 2) {
        initialPinchDistance = null;
      }
    }, { capture: true });
  </script>
</body>
</html>
